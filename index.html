<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>piano-player</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <main class="app">
    <h1>piano-player</h1>

    <section class="piano-wrap" aria-label="Virtual piano">
      <div class="white-keys" role="group" aria-label="White keys">
        <div class="key white" data-note="C3" id="C3"></div>
        <div class="key white" data-note="D3" id="D3"></div>
        <div class="key white" data-note="E3" id="E3"></div>
        <div class="key white" data-note="F3" id="F3"></div>
        <div class="key white" data-note="G3" id="G3"></div>
        <div class="key white" data-note="A3" id="A3"></div>
        <div class="key white" data-note="B3" id="B3"></div>

        <div class="key white" data-note="C4" id="C4"></div>
        <div class="key white" data-note="D4" id="D4"></div>
        <div class="key white" data-note="E4" id="E4"></div>
        <div class="key white" data-note="F4" id="F4"></div>
        <div class="key white" data-note="G4" id="G4"></div>
        <div class="key white" data-note="A4" id="A4"></div>
        <div class="key white" data-note="B4" id="B4"></div>

        <div class="key white" data-note="C5" id="C5"></div>
        <div class="key white" data-note="D5" id="D5"></div>
        <div class="key white" data-note="E5" id="E5"></div>
      </div>

      <div class="black-keys" role="group" aria-label="Black keys">
        <div class="key black" data-note="C#3" id="Cs3"></div>
        <div class="key black" data-note="D#3" id="Ds3"></div>

        <div class="key black" data-note="F#3" id="Fs3"></div>
        <div class="key black" data-note="G#3" id="Gs3"></div>
        <div class="key black" data-note="A#3" id="As3"></div>

        <div class="key black" data-note="C#4" id="Cs4"></div>
        <div class="key black" data-note="D#4" id="Ds4"></div>

        <div class="key black" data-note="F#4" id="Fs4"></div>
        <div class="key black" data-note="G#4" id="Gs4"></div>
        <div class="key black" data-note="A#4" id="As4"></div>

        <div class="key black" data-note="C#5" id="Cs5"></div>
        <div class="key black" data-note="D#5" id="Ds5"></div>
      </div>
    </section>

    <p class="hint">Играй мышью или клавиатурой.</p>
  </main>

  <script src="js/main.js"></script>
</body>
</html>
